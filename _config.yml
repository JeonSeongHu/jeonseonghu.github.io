# Site
name: "Seonghu Jeon"
title: "Seonghu Jeon"
description: "Seonghu Jeon — M.S. researcher at KAIST CVLAB working on 3D/4D vision, generative models, and robotics foundation models."
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
url: "https://jeonseonghu.github.io"
baseurl: ""
future: true
google_analytics: ''
# Comments via Utterances (GitHub Issues)
# disqus: ''
mailchimp-list: ''
include: ["_pages"]
permalink: /:title/

# Authors
authors:
  jeonseonghu:
    name: Seonghu Jeon
    display_name: Seonghu Jeon
    avatar: assets/images/profile_sm.png
    gravatar:
    email:
    web: https://jeonseonghu.github.io
    twitter:
    description: "M.S. researcher at KAIST CVLAB — 3D/4D vision, generative models, robotics."

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-polyglot
  - jekyll-redirect-from
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /blog/page:num/
    
# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "enabled"

exclude: [changelog.md, LICENSE.txt, README.md, DESIGN.md, IMAGE_PASTE_README.md, admin/ONLINE_EDITING.md, admin/cleanup-images.js, admin/upload-server.js, Gemfile, Gemfile.lock, vendor, _site, node_modules, .sass-cache, .jekyll-cache, .jekyll-metadata]

# Internationalization (jekyll-polyglot)
languages: ["ko", "en"]
default_lang: "ko"
exclude_from_localization:
  - assets
  - vendor
  - node_modules
  - _site
  - feed.xml
  - start.sh
  - docker-compose.yml

# Collections - Publications are now part of Projects with type: publication
collections:
  projects:
    output: true
    permalink: /projects/:slug/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      toc: true
      lang: "ko"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  # Keep the CMS entry point and its assets out of the sitemap
  - scope:
      path: "admin"
    values:
      sitemap: false
