# ============================================
# DECAP CMS CONFIGURATION
# Local file system backend for local development
# ============================================

backend:
  name: git-gateway

local_backend: true

# Enable auto-save
# (removed publish_mode: editorial_workflow to enable auto-save)

# ============================================
# MEDIA SETTINGS
# Images are stored per-post in assets/images/posts/{slug}/
# ============================================
media_folder: "assets/images/posts"
public_folder: "/assets/images/posts"

# ============================================
# COLLECTIONS
# ============================================
collections:
  # ----------------------------------------
  # Posts
  # ----------------------------------------
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    media_folder: "/assets/images/posts/{{slug}}"
    public_folder: "/assets/images/posts/{{slug}}"
    editor:
      preview: true
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"
      
      - label: "Hidden"
        name: "hidden"
        widget: "boolean"
        default: false
        required: false
      
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DD HH:mm"
        required: false
      
      - label: "Author"
        name: "author"
        widget: "string"
        default: "jeonseonghu"
      
      - label: "Main Category"
        name: "main_category"
        widget: "relation"
        collection: "main_categories"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
      
      - label: "Sub Category"
        name: "sub_category"
        widget: "relation"
        collection: "sub_categories"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]

      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
        media_folder: "/assets/images/posts/{{slug}}"
        public_folder: "/assets/images/posts/{{slug}}"
      
      - label: "Series"
        name: "series"
        widget: "relation"
        collection: "series"
        search_fields: ["name"]
        value_field: "{{slug}}"
        display_fields: ["name"]
        required: false

      - label: "Table of Contents"
        name: "toc"
        widget: "boolean"
        default: true
        required: false
      
      - label: "Body"
        name: "body"
        widget: "markdown"
        media_folder: "/assets/images/posts/{{slug}}"
        public_folder: "/assets/images/posts/{{slug}}"

  # ----------------------------------------
  # Series
  # ----------------------------------------
  - name: "series"
    label: "Series"
    folder: "_data/series"
    create: true
    extension: "yml"
    format: "yaml"
    slug: "{{slug}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Posts"
        name: "posts"
        widget: "relation"
        collection: "posts"
        multiple: true
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
        required: false

  # ----------------------------------------
  # Main Categories (folder-based for relation widget)
  # ----------------------------------------
  - name: "main_categories"
    label: "Main Categories"
    folder: "_data/main_categories"
    create: true
    extension: "yml"
    format: "yaml"
    slug: "{{slug}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"

  # ----------------------------------------
  # Sub Categories (folder-based for relation widget)
  # ----------------------------------------
  - name: "sub_categories"
    label: "Sub Categories"
    folder: "_data/sub_categories"
    create: true
    extension: "yml"
    format: "yaml"
    slug: "{{slug}}"
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Parent Category"
        name: "parent"
        widget: "relation"
        collection: "main_categories"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name"]
        required: false

  # ----------------------------------------
  # Projects
  # ----------------------------------------
  - name: "projects"
    label: "Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    media_folder: "/assets/images/projects/{{slug}}"
    public_folder: "/assets/images/projects/{{slug}}"
    editor:
      preview: true
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "project"
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["project", "publication"]
        default: "project"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Short Title"
        name: "short_title"
        widget: "string"
        required: false
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Authors / Team Members"
        name: "authors"
        widget: "string"
        hint: "Comma-separated list. Use * for equal contribution."
        required: false
      - label: "My Role"
        name: "role"
        widget: "string"
        hint: "e.g., Lead Developer, Research Contributor"
        required: false
      - label: "Venue"
        name: "venue"
        widget: "string"
        hint: "e.g., CVPR 2025, Course Project, Personal"
        required: false
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        field:
          label: "Tag"
          name: "tag"
          widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - label: "Paper Link"
        name: "link"
        widget: "string"
        required: false
        hint: "Link to the paper (arXiv, publication page, etc.)"
      - label: "Project Page Link"
        name: "project_link"
        widget: "string"
        required: false
        hint: "Link to project demo or website"
      - label: "arXiv Link"
        name: "arxiv"
        widget: "string"
        required: false
      - label: "PDF Link"
        name: "pdf"
        widget: "string"
        required: false
      - label: "Code Repository"
        name: "code"
        widget: "string"
        required: false
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

  # ----------------------------------------
  # Publications
  # ----------------------------------------
  - name: "publications"
    label: "Publications"
    folder: "_publications"
    create: true
    slug: "{{slug}}"
    media_folder: "/assets/images/publications/{{slug}}"
    public_folder: "/assets/images/publications/{{slug}}"
    editor:
      preview: true
    fields:
      - label: "Title (Short)"
        name: "title"
        widget: "string"
      - label: "Full Title"
        name: "full_title"
        widget: "string"
      - label: "Authors"
        name: "authors"
        widget: "string"
        hint: "Comma-separated list of authors. Use * for equal contribution."
      - label: "Venue"
        name: "venue"
        widget: "string"
        hint: "e.g., CVPR 2025, Under review, etc."
      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - label: "Thumbnail Image"
        name: "image"
        widget: "image"
        required: false
      - label: "arXiv Link"
        name: "arxiv"
        widget: "string"
        default: "#"
        required: false
      - label: "PDF Link"
        name: "pdf"
        widget: "string"
        default: "#"
        required: false
      - label: "Code Repository"
        name: "code"
        widget: "string"
        default: "#"
        required: false
      - label: "Project Page"
        name: "project_page"
        widget: "string"
        default: "#"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"
