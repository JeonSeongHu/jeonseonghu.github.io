<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Seonghu Jeon CMS</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />

  <style>
    :root {
      --cms-primary: #3539ad;
      --cms-primary-hover: #3a40e7;
      --cms-text: #1a1a1a;
      --cms-muted: #666666;
      --cms-soft: #f6f7fb;
      --cms-border: #e4e7ef;
      --cms-success: #198754;
      --cms-warning: #9a6700;
      --cms-danger: #b42318;
      --cms-shadow: 0 12px 36px rgba(22, 28, 45, 0.16);
    }

    body,
    html,
    * {
      font-family: "Wanted Sans Variable", "Wanted Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    }

    pre,
    code,
    kbd,
    samp,
    [class*="CodeMirror"] {
      font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace !important;
    }

    button[class*="css-"][class*="Button"],
    input,
    textarea,
    select {
      border-radius: 6px !important;
    }

    #editor-helper {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(330px, calc(100vw - 32px));
      color: var(--cms-text);
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid var(--cms-border);
      border-radius: 8px;
      box-shadow: var(--cms-shadow);
      z-index: 99999;
      overflow: hidden;
    }

    #editor-helper * {
      box-sizing: border-box;
    }

    .editor-helper-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--cms-border);
      background: var(--cms-soft);
    }

    .editor-helper-title {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .editor-helper-title strong {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .editor-helper-title span {
      color: var(--cms-muted);
      font-size: 11px;
      line-height: 1.4;
    }

    #editor-helper-toggle {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--cms-border);
      border-radius: 6px;
      background: #ffffff;
      color: var(--cms-text);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    #editor-helper-toggle:hover {
      border-color: var(--cms-primary);
      color: var(--cms-primary);
    }

    #editor-helper-body {
      padding: 12px 14px 14px;
    }

    #editor-helper.collapsed #editor-helper-body {
      display: none;
    }

    .editor-helper-grid {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px 10px;
      align-items: center;
      font-size: 12px;
    }

    .editor-label {
      color: var(--cms-muted);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.06em;
    }

    .editor-value {
      min-width: 0;
      color: var(--cms-text);
      overflow-wrap: anywhere;
    }

    .editor-value code {
      padding: 2px 5px;
      border-radius: 4px;
      background: #eef0fb;
      color: var(--cms-primary);
      font-size: 11px;
    }

    .editor-badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.3;
      background: #eef0fb;
      color: var(--cms-primary);
    }

    .editor-badge.online,
    .editor-badge.saved {
      background: #e8f5ee;
      color: var(--cms-success);
    }

    .editor-badge.offline,
    .editor-badge.error {
      background: #fff0ee;
      color: var(--cms-danger);
    }

    .editor-badge.checking,
    .editor-badge.saving {
      background: #fff8df;
      color: var(--cms-warning);
    }

    .editor-helper-note {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--cms-border);
      color: var(--cms-muted);
      font-size: 11px;
      line-height: 1.5;
    }

    #upload-toast {
      position: fixed;
      top: 18px;
      right: 18px;
      max-width: min(380px, calc(100vw - 32px));
      padding: 12px 14px;
      border: 1px solid var(--cms-border);
      border-radius: 8px;
      background: #ffffff;
      color: var(--cms-text);
      box-shadow: var(--cms-shadow);
      font-size: 13px;
      line-height: 1.45;
      z-index: 100000;
    }

    #upload-toast.success {
      border-color: #b8dec8;
      background: #f0fbf5;
      color: var(--cms-success);
    }

    #upload-toast.warning {
      border-color: #f0dd9f;
      background: #fffaf0;
      color: var(--cms-warning);
    }

    #upload-toast.error {
      border-color: #f2b8b5;
      background: #fff5f4;
      color: var(--cms-danger);
    }

    @media (max-width: 720px) {
      #editor-helper {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="nc-root"></div>

  <aside id="editor-helper" aria-label="CMS helper">
    <div class="editor-helper-head">
      <div class="editor-helper-title">
        <strong>Blog editor</strong>
        <span>Decap CMS for jeonseonghu.github.io</span>
      </div>
      <button id="editor-helper-toggle" type="button" title="Collapse helper" aria-expanded="true">-</button>
    </div>
    <div id="editor-helper-body">
      <div class="editor-helper-grid">
        <div class="editor-label">Access</div>
        <div class="editor-value"><code>/admin/</code></div>

        <div class="editor-label">Online</div>
        <div class="editor-value"><code>https://jeonseonghu.github.io/admin/</code></div>

        <div class="editor-label">Local</div>
        <div class="editor-value"><code>http://localhost:4000/admin/</code></div>

        <div class="editor-label">Mode</div>
        <div class="editor-value"><span id="editor-mode" class="editor-badge checking">Checking</span></div>

        <div class="editor-label">Auth</div>
        <div class="editor-value"><span id="auth-state" class="editor-badge checking">Checking</span></div>

        <div class="editor-label">Paste</div>
        <div class="editor-value"><span id="upload-server-state" class="editor-badge checking">Checking</span></div>

        <div class="editor-label">Save</div>
        <div class="editor-value">
          <span id="save-state" class="editor-badge saved">Saved</span>
          <span id="save-time"></span>
        </div>
      </div>
      <div id="editor-helper-note" class="editor-helper-note"></div>
    </div>
  </aside>

  <script>
    (function completeOAuthFallback() {
      const marker = '#/oauth-fallback?';
      if (!window.location.hash.startsWith(marker)) return;

      const params = new URLSearchParams(window.location.hash.slice(marker.length));
      const token = params.get('token');
      if (!token) return;

      window.localStorage.setItem('decap-cms-user', JSON.stringify({
        backendName: 'github',
        token
      }));
      window.history.replaceState(null, document.title, `${window.location.origin}${window.location.pathname}#/`);
      window.location.reload();
    }());
  </script>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function () {
      'use strict';

      const UPLOAD_BASE = 'http://localhost:3001';
      const UPLOAD_ENDPOINT = `${UPLOAD_BASE}/upload`;
      const LOCAL_HOSTS = ['localhost', '127.0.0.1', '::1'];
      let lastSaveTime = null;
      let cmsReady = false;

      function getById(id) {
        return document.getElementById(id);
      }

      function formatTime(date) {
        return [
          date.getHours().toString().padStart(2, '0'),
          date.getMinutes().toString().padStart(2, '0'),
          date.getSeconds().toString().padStart(2, '0')
        ].join(':');
      }

      function setBadge(id, label, state) {
        const element = getById(id);
        if (!element) return;
        element.textContent = label;
        element.className = `editor-badge ${state}`;
      }

      function isLocalHost() {
        return LOCAL_HOSTS.includes(window.location.hostname);
      }

      function setHelperNote(message) {
        const note = getById('editor-helper-note');
        if (note) note.innerHTML = message;
      }

      function updateSaveStatus(status) {
        if (status === 'saving') {
          setBadge('save-state', 'Saving', 'saving');
          const timeElement = getById('save-time');
          if (timeElement) timeElement.textContent = '';
          return;
        }

        lastSaveTime = new Date();
        setBadge('save-state', 'Saved', 'saved');
        const timeElement = getById('save-time');
        if (timeElement) timeElement.textContent = ` ${formatTime(lastSaveTime)}`;
      }

      function setEditorMode() {
        if (isLocalHost()) {
          setBadge('editor-mode', 'Local', 'online');
          setHelperNote('Run <code>./start.sh</code> for local editing. Clipboard image paste needs <code>localhost:3001</code>; use Markdown mode for direct insertion.');
        } else {
          setBadge('editor-mode', 'Online', 'online');
          setHelperNote('Online editing commits to GitHub after OAuth is configured. Use the CMS Media Library for images on the live site.');
        }
      }

      async function checkUploadServer() {
        if (!isLocalHost()) {
          setBadge('upload-server-state', 'Media Library', 'checking');
          return;
        }

        setBadge('upload-server-state', 'Checking', 'checking');

        try {
          const response = await fetch(`${UPLOAD_BASE}/status`, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          setBadge('upload-server-state', 'Online', 'online');
        } catch (error) {
          setBadge('upload-server-state', 'Offline', 'offline');
        }
      }

      function showToast(type, message, timeout) {
        const existing = getById('upload-toast');
        if (existing) existing.remove();

        const toast = document.createElement('div');
        toast.id = 'upload-toast';
        toast.className = type;
        toast.textContent = message;
        document.body.appendChild(toast);

        if (timeout !== 0) {
          window.setTimeout(() => toast.remove(), timeout || 4000);
        }
      }

      async function cleanupUnusedImages() {
        if (!isLocalHost()) return;

        try {
          const response = await fetch(`${UPLOAD_BASE}/cleanup`, { method: 'POST' });
          if (!response.ok) return;

          const result = await response.json();
          if (result.deleted > 0) {
            console.info(`Cleaned up ${result.deleted} unused image(s).`);
          }
        } catch (error) {
          // Local upload server is optional outside the dev environment.
        }
      }

      function findCodeMirror() {
        const editors = Array.from(document.querySelectorAll('.CodeMirror'));
        return editors.find((editor) => editor.CodeMirror && editor.contains(document.activeElement)) ||
          editors.find((editor) => editor.CodeMirror);
      }

      async function insertImageMarkdown(path, altText) {
        const imageMarkdown = `\n![${altText}](${path})\n`;
        const codeMirrorElement = findCodeMirror();

        if (codeMirrorElement && codeMirrorElement.CodeMirror) {
          const editor = codeMirrorElement.CodeMirror;
          editor.replaceRange(imageMarkdown, editor.getCursor());
          editor.focus();
          return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(imageMarkdown);
          showToast('warning', 'Image markdown was copied. Switch to Markdown mode and paste it where you want the image.', 6000);
          return;
        }

        console.info('Image markdown:', imageMarkdown);
        showToast('warning', 'Image uploaded, but the markdown could not be inserted automatically. Check the browser console.', 6000);
      }

      async function handleImagePaste(event) {
        if (!isLocalHost()) return;

        const items = event.clipboardData && event.clipboardData.items;
        if (!items) return;

        const imageItem = Array.from(items).find((item) => item.type.indexOf('image') !== -1);
        if (!imageItem) return;

        event.preventDefault();
        const blob = imageItem.getAsFile();
        if (!blob) return;

        const filename = `image-${Date.now()}.png`;
        showToast('warning', 'Uploading pasted image...', 0);

        try {
          const formData = new FormData();
          formData.append('file', blob, filename);

          const response = await fetch(UPLOAD_ENDPOINT, {
            method: 'POST',
            body: formData
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const result = await response.json();
          await insertImageMarkdown(result.path, result.filename || filename);
          showToast('success', `Uploaded image: ${result.filename || filename}`, 3500);
          checkUploadServer();
        } catch (error) {
          console.error('Image upload failed:', error);
          showToast('error', 'Image upload failed. Start the local upload server with ./start.sh and try again.', 6000);
          checkUploadServer();
        }
      }

      function setupHelperToggle() {
        const helper = getById('editor-helper');
        const toggle = getById('editor-helper-toggle');
        if (!helper || !toggle) return;

        const collapsed = window.localStorage.getItem('cms-helper-collapsed') === 'true';
        helper.classList.toggle('collapsed', collapsed);
        toggle.textContent = collapsed ? '+' : '-';
        toggle.setAttribute('aria-expanded', String(!collapsed));
        toggle.title = collapsed ? 'Expand helper' : 'Collapse helper';

        toggle.addEventListener('click', () => {
          const nextCollapsed = !helper.classList.contains('collapsed');
          helper.classList.toggle('collapsed', nextCollapsed);
          toggle.textContent = nextCollapsed ? '+' : '-';
          toggle.setAttribute('aria-expanded', String(!nextCollapsed));
          toggle.title = nextCollapsed ? 'Expand helper' : 'Collapse helper';
          window.localStorage.setItem('cms-helper-collapsed', String(nextCollapsed));
        });
      }

      async function checkAuthConfig() {
        if (isLocalHost()) {
          setBadge('auth-state', 'Local proxy', 'online');
          return;
        }

        try {
          const response = await fetch('config.yml', { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const config = await response.text();
          const hasGithubBackend = /^\s*name:\s*github\s*$/m.test(config);
          const hasActiveBaseUrl = /^\s*base_url:\s*\S+/m.test(config);

          if (hasGithubBackend && hasActiveBaseUrl) {
            setBadge('auth-state', 'GitHub OAuth', 'online');
          } else if (hasGithubBackend) {
            setBadge('auth-state', 'OAuth needed', 'checking');
          } else {
            setBadge('auth-state', 'Not online-ready', 'offline');
          }
        } catch (error) {
          setBadge('auth-state', 'Unknown', 'error');
        }
      }

      function registerPreviewTemplate(cms) {
        if (!cms || !window.createClass || !window.h) return false;

        const PostPreview = createClass({
          componentDidMount: function () {
            this.updateCaptions();
          },

          componentDidUpdate: function () {
            this.updateCaptions();
          },

          updateCaptions: function () {
            const container = this.containerRef;
            if (!container) return;

            const images = container.querySelectorAll('img');
            images.forEach((img) => {
              if (img.closest('figure')) return;

              const captionText = img.getAttribute('alt') || img.getAttribute('title');
              if (!captionText || !captionText.trim()) return;

              const figure = document.createElement('figure');
              const figcaption = document.createElement('figcaption');
              figcaption.textContent = captionText;

              const parent = img.parentNode;
              if (parent && parent.tagName === 'P' && parent.childNodes.length === 1) {
                parent.parentNode.insertBefore(figure, parent);
                figure.appendChild(img);
                parent.remove();
              } else if (parent) {
                parent.insertBefore(figure, img);
                figure.appendChild(img);
              }

              figure.appendChild(figcaption);
            });
          },

          render: function () {
            const entry = this.props.entry;
            const title = entry.getIn(['data', 'title']) || '';
            const body = this.props.widgetFor('body');

            return h('div', {
              className: 'preview-container',
              ref: (element) => { this.containerRef = element; }
            },
              h('style', {}, `
                .preview-container {
                  font-family: "Wanted Sans Variable", "Wanted Sans", -apple-system, BlinkMacSystemFont, sans-serif;
                  font-size: 1.05rem;
                  line-height: 1.72;
                  color: rgba(0, 0, 0, 0.82);
                  padding: 2rem;
                  max-width: 920px;
                  margin: 0 auto;
                  counter-reset: h1-counter;
                }
                .preview-container h1 {
                  font-size: 1.75rem;
                  font-weight: 760;
                  margin: 2rem 0 1rem;
                  padding-bottom: 0.5rem;
                  border-bottom: 1px solid rgba(0,0,0,0.1);
                  counter-reset: h2-counter;
                  counter-increment: h1-counter;
                }
                .preview-container h1::before {
                  content: counter(h1-counter) ". ";
                  color: #3539ad;
                }
                .preview-container h2 {
                  font-size: 1.45rem;
                  font-weight: 740;
                  margin: 1.6rem 0 0.75rem;
                  counter-increment: h2-counter;
                }
                .preview-container h2::before {
                  content: counter(h1-counter) "." counter(h2-counter) ". ";
                  color: #3539ad;
                }
                .preview-container p { margin-bottom: 1rem; }
                .preview-container blockquote {
                  background: rgba(58, 64, 231, 0.05);
                  padding: 1rem;
                  margin: 1rem 0;
                  border-radius: 8px;
                }
                .preview-container code {
                  background: rgba(0,0,0,0.05);
                  padding: 0.2em 0.4em;
                  border-radius: 3px;
                  font-size: 0.9em;
                }
                .preview-container pre {
                  background: #f8f8f8;
                  padding: 1rem;
                  border-radius: 6px;
                  overflow-x: auto;
                }
                .preview-container img {
                  max-width: 100%;
                  border-radius: 8px;
                  margin: 1rem 0;
                }
                .preview-container figure {
                  display: block !important;
                  margin: 1.5rem 0;
                  text-align: center;
                }
                .preview-container figcaption {
                  display: block !important;
                  margin-top: 0.5rem;
                  font-size: 0.9rem;
                  color: #666666;
                  text-align: center;
                  font-style: italic;
                  line-height: 1.4;
                }
                .preview-title {
                  font-size: 2rem;
                  font-weight: 800;
                  margin-bottom: 1.5rem;
                  padding-bottom: 0.75rem;
                  border-bottom: 3px solid #3539ad;
                }
              `),
              h('h1', { className: 'preview-title' }, title),
              h('div', { className: 'preview-body' }, body)
            );
          }
        });

        cms.registerPreviewTemplate('posts', PostPreview);
        return true;
      }

      function registerCmsEvents(cms) {
        if (!cms) return false;

        cms.registerEventListener({
          name: 'preSave',
          handler: () => updateSaveStatus('saving')
        });

        cms.registerEventListener({
          name: 'postSave',
          handler: async () => {
            updateSaveStatus('saved');
            cleanupUnusedImages();
          }
        });

        return true;
      }

      function initCms() {
        if (cmsReady) return true;

        const cms = window.CMS;
        if (!cms) return false;

        registerPreviewTemplate(cms);
        registerCmsEvents(cms);

        if (typeof window.initCMS === 'function') {
          window.initCMS();
        } else if (typeof cms.init === 'function') {
          cms.init();
        }

        cmsReady = true;
        return true;
      }

      function initCmsWhenReady() {
        if (initCms()) return;

        let attempts = 0;
        const timer = window.setInterval(() => {
          attempts += 1;

          if (initCms() || attempts >= 30) {
            window.clearInterval(timer);
          }

          if (attempts >= 30 && !cmsReady) {
            console.warn('Decap CMS global API was not available; helper UI still loaded.');
          }
        }, 100);
      }

      setupHelperToggle();
      setEditorMode();
      checkAuthConfig();
      updateSaveStatus('saved');
      checkUploadServer();
      window.setInterval(checkUploadServer, 30000);
      document.addEventListener('paste', handleImagePaste);
      initCmsWhenReady();

      console.info('CMS helper loaded. Open /admin/ locally with ./start.sh for full editing support.');
    }());
  </script>
</body>

</html>
