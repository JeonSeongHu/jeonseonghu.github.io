name: Optimize Images to WebP

on:
  push:
    paths:
      - 'assets/images/**/*.png'
      - 'assets/images/**/*.jpg'
      - 'assets/images/**/*.jpeg'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebP tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq webp

      - name: Convert images to WebP
        run: |
          converted=0
          find assets/images -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) -size +50k | while read img; do
            # Skip already-optimized small variants
            case "$img" in
              *_sm.png|*_400.png) continue ;;
            esac

            webp="${img%.*}.webp"
            # Skip if WebP already exists
            [ -f "$webp" ] && continue

            echo "Converting: $img"
            cwebp -q 80 -m 6 "$img" -o "$webp" 2>/dev/null

            if [ -f "$webp" ]; then
              orig_size=$(stat -c%s "$img")
              webp_size=$(stat -c%s "$webp")

              if [ "$webp_size" -lt "$orig_size" ]; then
                # Update references in content files
                orig_name=$(basename "$img")
                webp_name=$(basename "$webp")
                find _posts _pages _projects _includes _layouts _config.yml -type f \( -name "*.md" -o -name "*.html" -o -name "*.yml" \) 2>/dev/null | xargs grep -l "$orig_name" 2>/dev/null | while read file; do
                  sed -i "s|$orig_name|$webp_name|g" "$file"
                  echo "  Updated ref: $file"
                done

                # Remove original
                rm "$img"
                echo "  Saved: $((orig_size - webp_size)) bytes"
              else
                # WebP is larger, keep original
                rm "$webp"
                echo "  Skipped (WebP not smaller)"
              fi
            fi
          done

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add -A
            git commit -m "chore(images): auto-convert to WebP [skip ci]"
            git push
          fi
